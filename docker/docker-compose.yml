services:
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount Parquet data read-only; run materialise.py before first start.
      - ../data:/app/data:ro
    environment:
      DATA_DIR: /app/data
      DB_PATH:  /app/data/gbf.duckdb
      CACHE_TTL: "3600"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 15s
